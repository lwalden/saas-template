name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SaasTemplate.sln

      - name: Build
        run: dotnet build SaasTemplate.sln --no-restore --configuration Release

      # SqlServer-tagged tests require LocalDB (Windows only) — excluded on Linux CI.
      # Smoke-tagged tests hit live URLs — excluded on CI.
      - name: Unit tests
        run: dotnet test tests/SaasTemplate.Api.Tests --no-build --configuration Release --verbosity normal --filter "Category!=SqlServer&Category!=Smoke"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <!-- Option A: Shield with checkmark + "AccessiShield" wordmark -->
  <!-- Shield shape with gradient fill, checkmark inside -->
  <defs>
    <linearGradient id="shieldGradA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#0069D1"/>
    </linearGradient>
  </defs>
  <!-- Shield path -->
  <path d="M24 4 L44 12 L44 28 C44 40 34 48 24 52 C14 48 4 40 4 28 L4 12 Z" fill="url(#shieldGradA)"/>
  <!-- White inner border — same 3.5px stroke as the checkmark, inset from shield edge -->
  <path d="M24 8.5 L40.5 14.5 L40.5 28 C40.5 38 32 45 24 48.5 C16 45 7.5 38 7.5 28 L7.5 14.5 Z" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Checkmark inside shield -->
  <path d="M15 28 L21 34 L33 20" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Wordmark -->
  <text x="56" y="36" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">Accessi<tspan fill="#0077B6">Shield</tspan></text>
</svg>
